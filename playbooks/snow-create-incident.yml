---
- name: ServiceNow Create Incident (Demo Mock)
  hosts: localhost
  gather_facts: false
  vars:
    snow_instance: "demo-mock"
  tasks:
    - name: Mock ServiceNow ticket creation
      ansible.builtin.set_fact:
        snow_ticket_number: "INC{{ 1000000 | random(seed=inventory_hostname) }}"
        snow_sys_id: "mock-{{ lookup('pipe', 'date +%s') }}"
    - name: Display mock ticket
      ansible.builtin.debug:
        msg: "✅ DEMO: ServiceNow ticket {{ snow_ticket_number }} created successfully"
    - name: Notify NOC of ticket creation
      ansible.builtin.uri:
        url: "https://noc-api-gruve-noc.apps.ocp-mig2.gruveai.com/api/v1/incidents/{{ incident_id | default('unknown') }}/ticket"
        method: POST
        body_format: json
        validate_certs: false
        body:
          ticket_number: "{{ snow_ticket_number }}"
          sys_id: "{{ snow_sys_id }}"
        status_code: [200, 201, 404, 422]
      failed_when: false
