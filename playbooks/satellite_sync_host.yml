---
# satellite_sync_host.yml — called per host, no community.general needed

- name: "Query Satellite errata for {{ host_item.name }}"
  ansible.builtin.uri:
    url: "{{ satellite_url }}/api/hosts/{{ host_item.id }}/errata?per_page=500&type=security"
    method: GET
    user: "{{ satellite_user }}"
    password: "{{ satellite_pass }}"
    force_basic_auth: true
    validate_certs: false
    timeout: 60
  register: errata_response
  failed_when: false

- name: "Query package count for {{ host_item.name }}"
  ansible.builtin.uri:
    url: "{{ satellite_url }}/api/hosts/{{ host_item.id }}/packages?per_page=1"
    method: GET
    user: "{{ satellite_user }}"
    password: "{{ satellite_pass }}"
    force_basic_auth: true
    validate_certs: false
    timeout: 30
  register: packages_response
  failed_when: false

- name: "Set base facts for {{ host_item.name }}"
  ansible.builtin.set_fact:
    errata_list: "{{ errata_response.json.results  | default([]) }}"
    total_errata: "{{ errata_response.json.total    | default(0) }}"
    pkg_count: "{{ packages_response.json.total  | default(0) }}"

- name: "Count severities for {{ host_item.name }}"
  ansible.builtin.set_fact:
    count_critical: "{{ errata_list | selectattr('severity', 'defined') | selectattr('severity', 'equalto', 'Critical')  | list | length }}"
    count_important: "{{ errata_list | selectattr('severity', 'defined') | selectattr('severity', 'equalto', 'Important') | list | length }}"
    count_moderate: "{{ errata_list | selectattr('severity', 'defined') | selectattr('severity', 'equalto', 'Moderate')  | list | length }}"
    count_low: "{{ errata_list | selectattr('severity', 'defined') | selectattr('severity', 'equalto', 'Low')       | list | length }}"

- name: "Build updates list for {{ host_item.name }}"
  ansible.builtin.set_fact:
    updates_list: "{{ errata_list[:50] | map('ansible.builtin.combine', {}) | list }}"

- name: "Format updates for {{ host_item.name }}"
  ansible.builtin.set_fact:
    formatted_updates: >-
      {{ formatted_updates | default([]) + [{
        'name':              item.errata_id | default(''),
        'advisory':          item.errata_id | default(''),
        'severity':          item.severity  | default('moderate') | lower,
        'current_version':   '',
        'available_version': '',
        'cves':              item.cves      | default([])
      }] }}
  loop: "{{ errata_list[:50] }}"
  when: errata_list | length > 0

- name: "Reset formatted_updates if no errata"
  ansible.builtin.set_fact:
    formatted_updates: []
  when: errata_list | length == 0

- name: "POST results to Gruve NOC for {{ host_item.name }}"
  ansible.builtin.uri:
    url: "{{ gruve_noc_api }}/api/v1/vulnerabilities/scan/{{ host_item.name }}"
    method: POST
    body_format: json
    validate_certs: false
    timeout: 60
    body:
      vm_name: "{{ host_item.name }}"
      vm_ip: "{{ host_item.ip }}"
      rhel_version: "{{ host_item.rhel }}"
      scan_type: "satellite"
      packages_scanned: "{{ pkg_count | int }}"
      security_updates: "{{ total_errata | int }}"
      critical: "{{ count_critical  | int }}"
      important: "{{ count_important | int }}"
      moderate: "{{ count_moderate  | int }}"
      low: "{{ count_low       | int }}"
      updates: "{{ formatted_updates | default([]) }}"
      raw_output: "Satellite sync — {{ total_errata }} security errata"
  register: noc_response
  failed_when: false

- name: "Result for {{ host_item.name }}"
  ansible.builtin.debug:
    msg: >-
      {{ host_item.name }}:
      critical={{ count_critical }}
      important={{ count_important }}
      moderate={{ count_moderate }}
      total={{ total_errata }}
      NOC={{ noc_response.status | default('error') }}

- name: "Reset formatted_updates for next host"
  ansible.builtin.set_fact:
    formatted_updates: []
