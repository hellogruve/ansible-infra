---
- name: Restart a systemd service
  hosts: all
  become: true

  vars:
    service_name: ""

  tasks:
    - name: Validate service name provided
      ansible.builtin.fail:
        msg: "Please provide service_name variable"
      when: service_name == ""

    - name: Restart the service
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        state: restarted
      register: restart_result

    - name: Verify service is running
      ansible.builtin.systemd:
        name: "{{ service_name }}"
      register: verify

    - name: Report status
      ansible.builtin.debug:
        msg: "{{ service_name }} is {{ verify.status.ActiveState }}"
